apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: etl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: etl-producer:latest   # replace with your image name
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BROKER
              value: kafka:9092