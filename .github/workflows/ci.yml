name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build producer and consumer
        run: |
          cd producer && go build -v .
          cd ../consumer && go build -v .

      - name: Start Docker Compose
        run: |
          docker compose up -d
          sleep 20   # wait for services to stabilize

      - name: Verify PostgreSQL has data
        run: |
          # Wait for at least 5 rows
          for i in {1..30}; do
            COUNT=$(docker exec etl-pipeline-postgres-1 psql -U postgres -d etl -t -c "SELECT COUNT(*) FROM logs;" | tr -d ' ')
            if [ "$COUNT" -ge 5 ]; then
              echo "✅ Data flowing: $COUNT rows"
              exit 0
            fi
            sleep 2
          done
          echo "❌ No data inserted after 60 seconds"
          exit 1

      - name: Check consumer metrics endpoint
        run: |
          curl -f http://localhost:8080/metrics | grep logs_processed_total

      # Build and push images (optional)
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push producer image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/etl-producer:latest ./producer
          docker push ${{ secrets.DOCKER_USERNAME }}/etl-producer:latest

      - name: Build and push consumer image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/etl-consumer:latest ./consumer
          docker push ${{ secrets.DOCKER_USERNAME }}/etl-consumer:latest